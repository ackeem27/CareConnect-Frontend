services:
  - type: web
    name: careconnect-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://careconnect-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
